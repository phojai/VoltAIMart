<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">

      <span>2-year warranty on every device</span>
      <span>30-day easy returns</span>
      <span>24/7 voice support</span>
    </div>
    <div>Need help? <strong style="color:var(--text-primary)">1-800-VOLT-AI</strong></div>
  </div>
</div>

<header class="site-header">
  <div class="container nav-row">
    <button class="hamburger-btn" id="menuToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="logo"><span class="mark">⚡</span> VoltAIMart</a>
    <div class="nav-icons">
      <a href="wishlist.html" class="icon-btn" title="Wishlist">🤍</a>
      <a href="cart.html" class="icon-btn" title="Cart">
        🛒
        <span class="badge" data-cart-badge>0</span>
      </a>
      <a href="login.html" class="icon-btn" title="Account" data-account-link>👤</a>
      <button class="icon-btn call-sim-btn" id="phoneSimBtn" title="Try a call to VoltAI" type="button">📞</button>
    </div>
  </div>
  <div class="container search-row">
    <div class="nav-search nav-search-wide">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="topSearchInput" placeholder="Search products, or ask VoltAI…">
      <button class="mic-btn" title="Search by voice">🎙️</button>
    </div>
  </div>
</header>

<section class="section tight">
  <div class="container" style="max-width:720px;">
    <div class="breadcrumb"><a href="index.html">Home</a> / Track order</div>
    <div class="section-head">
      <div>
        <p class="eyebrow accent">Order status</p>
        <h2>Track your order</h2>
      </div>
    </div>

    <div class="card">
      <form id="trackForm">
        <div class="form-grid">
          <div>
            <label class="auth-label">Order ID</label>
            <input type="text" id="tOrderId" class="auth-input" placeholder="ORD-XXXXXXXX">
          </div>
          <div>
            <label class="auth-label">Email used at checkout</label>
            <input type="email" id="tEmail" class="auth-input" placeholder="you@example.com">
          </div>
        </div>
        <div class="auth-error" id="trackError"></div>
        <button type="submit" class="btn btn-primary" style="margin-top:16px;" id="trackSubmit">Track order</button>
      </form>
    </div>

    <div id="trackResult" style="margin-top:22px;"></div>
  </div>
</section>

<footer>
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 VoltAIMart. All rights reserved.</span>
      <span>Privacy · Terms</span>
    </div>
  </div>
</footer>

<script src="js/api.js"></script>
<script src="js/catalog.js"></script>
<script src="js/app.js"></script>
<script src="js/aichat.js"></script>
<!-- @vapi-ai/web no longer ships a plain-global browser bundle — every file under
     its dist/ (including dist/vapi.min.js) is CommonJS ("exports"/"require"), which
     throws "exports is not defined" if loaded via a plain <script src>. Load it as
     an ES module instead via jsDelivr's +esm conversion, then stash the default
     export on window.Vapi so phoneSimulator.js (a classic script) can still find it. -->
<script type="module">
  import Vapi from "https://cdn.jsdelivr.net/npm/@vapi-ai/web/+esm";
  window.Vapi = Vapi;
</script>
<script src="js/vapiCall.js"></script>
<script src="js/phoneSimulator.js"></script>
<script>
function trackTimelineHTML(status){
  if (status === "cancelled"){
    return `<div class="order-cancelled-banner">✕ This order was cancelled</div>`;
  }
  const steps = ["processing", "shipped", "delivered"];
  const labels = { processing: "Processing", shipped: "Shipped", delivered: "Delivered" };
  const idx = steps.indexOf(status);
  return `<div class="order-timeline">` + steps.map((s, i) => {
    const cls = i < idx ? "done" : i === idx ? "current" : "";
    const icon = i < idx ? "✓" : i === idx ? "●" : "";
    return `${i ? `<div class="timeline-line ${i <= idx ? "done" : ""}"></div>` : ""}<div class="timeline-step ${cls}"><span class="timeline-dot">${icon}</span> ${labels[s]}</div>`;
  }).join("") + `</div>`;
}

document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("trackForm");
  const errorEl = document.getElementById("trackError");
  const result = document.getElementById("trackResult");

  async function track(id, email){
    errorEl.textContent = "";
    result.innerHTML = "";
    const btn = document.getElementById("trackSubmit");
    btn.disabled = true;
    btn.textContent = "Looking up…";
    try {
      const order = await Api.trackOrder(id, email);
      result.innerHTML = `
        <div class="card">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:6px;">
            <div>
              <div class="mono" style="font-size:13px;">${order.id}</div>
              <div class="muted" style="font-size:12.5px;">Placed ${new Date(order.createdAt).toLocaleDateString('en-IN', { year: "numeric", month: "short", day: "numeric" })}</div>
            </div>
            <span class="status-select status-${order.status}" style="pointer-events:none;">${order.status}</span>
          </div>
          ${trackTimelineHTML(order.status)}
          <div style="display:flex; flex-direction:column; gap:8px; margin:14px 0;">
            ${order.items.map(i => `
              <div style="display:flex; justify-content:space-between; font-size:14px;">
                <span>${i.icon || ""} ${i.name} <span class="muted">×${i.qty}</span></span>
                <span>₹${i.lineTotal.toLocaleString('en-IN')}</span>
              </div>
            `).join("")}
          </div>
          <div class="summary-row total" style="border-top:1px solid var(--divider); padding-top:12px; margin:0;">
            <span>Total</span><span>₹${order.total.toLocaleString('en-IN')}</span>
          </div>
          ${order.city ? `<p class="muted" style="font-size:13px; margin-top:12px;">Delivering to ${order.city} ${order.pincode || ""}</p>` : ""}
          <p class="muted" style="font-size:12.5px; margin-top:8px;">📧 Status updates are emailed to ${email} <span style="opacity:.7;">(simulated — no real email is sent)</span></p>
        </div>
      `;
    } catch(err){
      errorEl.textContent = err.message || "Couldn't find that order.";
    } finally {
      btn.disabled = false;
      btn.textContent = "Track order";
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const id = document.getElementById("tOrderId").value.trim();
    const email = document.getElementById("tEmail").value.trim();
    if (!id || !email){
      errorEl.textContent = "Enter both the order ID and the email used at checkout.";
      return;
    }
    track(id, email);
  });

  // Deep link support: track.html?id=ORD-xxx&email=...
  const params = new URLSearchParams(location.search);
  if (params.get("id") && params.get("email")){
    document.getElementById("tOrderId").value = params.get("id");
    document.getElementById("tEmail").value = params.get("email");
    track(params.get("id"), params.get("email"));
  }
});
</script>
</body>
</html>
